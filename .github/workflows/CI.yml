# CI for src folder
name: CI

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'test/**'
      - 'src/**'
      - 'config/**'
      - '.github/**'
      - 'package.json'
      - 'yarn.lock'
  push:
    branches:
      - master
    paths:
      - 'test/**'
      - 'src/**'
      - 'config/**'
      - '.github/**'
      - 'package.json'
      - 'yarn.lock'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      - run: HUSKY=0 yarn install --frozen-lockfile --network-concurrency 1
      - run: yarn lint
      - run: yarn type-check
      - name: Run unit tests
        id: run_unit_tests
        run: yarn test --pool=forks
      - name: Print failed unit tests
        if: ${{ failure() && steps.run_unit_tests.outcome == 'failure' }}
        run: node .github/workflows/print-vitest-failures.cjs
      - run: yarn build
      - name: Upload dist artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  e2e:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: mock
            command: CHROME_BIN=$(which chromium-browser) yarn test:e2e:mock
            browsers: chromium
          - suite: chrome
            command: DEBUG="plebbit-js:*,bitsocial-react-hooks:*" CHROME_BIN=$(which chromium-browser) yarn test:e2e:chrome
            browsers: chromium
          - suite: firefox
            command: DEBUG="plebbit-js:*,bitsocial-react-hooks:*" FIREFOX_BIN=$(which firefox) yarn test:e2e:firefox
            browsers: firefox
          - suite: mock-content
            command: CHROME_BIN=$(which chromium-browser) yarn test:e2e:mock-content
            browsers: chromium
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'
      - run: HUSKY=0 yarn install --frozen-lockfile --network-concurrency 1
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: sudo echo "255.255.255.255 cloudflare-ipfs.com" | sudo tee -a /etc/hosts
      - run: sudo echo "255.255.255.255 pubsubprovider.xyz" | sudo tee -a /etc/hosts
      - run: yarn playwright install ${{ matrix.browsers }}
      - run: yarn build
      - run: yarn test:server & yarn test:server:wait-on
      - name: Run e2e ${{ matrix.suite }} tests
        id: run_e2e
        run: ${{ matrix.command }}
      - name: Print failed e2e ${{ matrix.suite }} tests
        if: ${{ failure() && steps.run_e2e.outcome == 'failure' }}
        run: node .github/workflows/print-vitest-failures.cjs

  dist:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [checks, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: git add dist --force
      - run: git status
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'chore(dist): CI build'
          file_pattern: dist
          add_options: '--force'
          branch: ${{ github.ref_name }}
